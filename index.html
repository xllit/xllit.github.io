<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="msvalidate.01" content="B71C8408EDA264902581D401CB093BD9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="雨猫的个人网站,欢迎来看一看呀">
    <meta name="keywords" content="雨猫岛, RaincatIsland, 雨猫的个人网站, 雨猫的岛屿, 雨猫猫">
    <title>雨猫岛</title>
    <style>
        /* 全局样式 */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 标签栏样式 */
        .navbar {
            background-color: #ADD8E6;
            padding: 0.5rem 2.5rem;
            display: flex;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-right: 1.25rem;
        }

        .navbar .logo img {
            height: 1.875rem;
            margin-right: 0.625rem;
        }

        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .navbar ul li {
            margin-left: 1.25rem;
        }

        .navbar ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .navbar ul li a:hover {
            color: #007BFF;
        }

        /* 搜索框样式 */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            margin-right: 1.25rem;
        }

        .search-icon {
            width: 1.875rem;
            height: 1.875rem;
            background: url('./Mainpage/re.png') no-repeat center center;
            background-size: contain;
            cursor: default;
            transition: transform 0.3s ease;
        }

        .search-bar {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            padding: 0.3125rem;
            font-size: 1rem;
            border-radius: 1.25rem;
            border: 1px solid #ccc;
            outline: none;
            opacity: 0;
            transition: width 0.3s ease, opacity 0.3s ease;
        }

        .search-container:hover .search-bar {
            width: 12.5rem;
            opacity: 1;
        }

        .search-container:hover .search-icon {
            transform: rotate(90deg);
        }

        /* 背景图像和标题区域 */
        .hero {
            background-image: url('./Mainpage/background.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero h1 {
            font-size: 3.125rem;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.25rem;
            margin: 0.625rem 0 0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* 预留扩展区域 */
        .content {
            padding: 3.125rem 1.25rem;
            min-height: 100vh;
        }

        /* 音乐播放器样式 */
        .player-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #87CEFA;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: width 0.3s, border-radius 0.3s;
            z-index: 1001; /* 确保播放器在其他内容之上 */
        }

        .player-controls {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            width: 100%;
            height: 100%;
            color: white;
        }

        .player-btn.expanded {
            width: 160px;
            border-radius: 30px;
        }

        .player-btn.expanded .player-controls {
            display: flex;
        }

        .play-list {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 160px;
            max-height: 200px;
            background-color: #87CEFA;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px 0;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(20px);
        }

        .play-list.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .play-list .song {
            padding: 10px 20px;
            cursor: pointer;
            color: white;
        }

        .play-list .song:hover {
            background-color: #00BFFF;
        }
    </style>
</head>
<body>
    <!-- 标签栏 -->
    <div class="navbar">
        <!-- 搜索框 -->
        <div class="search-container">
            <div class="search-icon"></div>
            <input type="text" id="searchInput" class="search-bar" placeholder="别搜,没用...">
        </div>
        <div class="logo">
            <img src="" alt="图标"> <!-- 替换为你的图标 -->
            雨猫岛
        </div>
        <ul>
            <li><a href="#intro">简介</a></li>
            <li><a href="#contact">联系猫猫</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#feedback">提出意见</a></li>
        </ul>
    </div>

    <!-- 动图背景与标题 -->
    <div class="hero">
        <h1>雨猫岛</h1>
        <p>一只猫猫的个人网站</p>
    </div>

    <!-- 预留扩展区域 -->
    <div class="content" id="intro">
        <h2>简介</h2>
        <p>我在不久的将来会创建雨猫工作室RaincatProduction。<br>一个专注于创造的团队。<br>可惜我学业比较繁忙，才来不及追求自己想要的。<br>属实是遗憾啊！</p><br>
    </div>

    <div class="content" id="contact">
        <h2>联系猫猫</h2>
        <p>为了防止有不明来意的人恶意添加我的好友，请给以下</p>
    </div>

    <div class="content" id="projects">
        <h2>项目</h2>
        <p>倒是有一些现在的项目，但是没什么用，我挺废物。<br>你可以点击以下链接以访问半成品项目目录</p><br>
    </div>

    <div class="content" id="feedback">
        <h2>提出意见</h2>
        <p>这里是收集意见的部分。你可以在这里添加反馈表单或其他内容。</p>
    </div>

    <!-- 音乐播放器 -->
    <div class="player-btn" id="player-btn">
        <div class="player-controls">
            <span id="play-pause">▶️</span>
        </div>
    </div>
    <div class="play-list" id="play-list">
        <div class="song">Song 1</div>
        <div class="song">Song 2</div>
        <div class="song">Song 3</div>
        <!-- More song items can be added here -->
    </div>

    <audio id="audio-player"></audio>

    <script>
        const playerBtn = document.getElementById('player-btn');
        const playList = document.getElementById('play-list');
        const playPause = document.getElementById('play-pause');
        const audioPlayer = document.getElementById('audio-player');

        let isPlaying = false;

        playerBtn.addEventListener('click', () => {
            if (playList.classList.contains('active')) {
                playList.classList.remove('active');
                playerBtn.classList.remove('expanded');
            } else {
                playList.classList.add('active');
                playerBtn.classList.add('expanded');
            }
        });

        document.querySelectorAll('.song').forEach((song, index) => {
            song.addEventListener('click', () => {
                audioPlayer.src = `song${index + 1}.mp3`; // Replace with actual song paths
                audioPlayer.play();
                isPlaying = true;
                playPause.textContent = '⏸️';
                playList.classList.remove('active');
                playerBtn.classList.remove('expanded');
            });
        });

        playPause.addEventListener('click', () => {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                playPause.textContent = '▶️';
            } else {
                audioPlayer.play();
                isPlaying = true;
                playPause.textContent = '⏸️';
            }
        });
    </script>
    
</body>
</html>
