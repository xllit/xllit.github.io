<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="msvalidate.01" content="B71C8408EDA264902581D401CB093BD9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="雨猫的个人网站,欢迎来看一看呀">
    <meta name="keywords" content="雨猫岛, RaincatIsland, 雨猫的个人网站, 雨猫的岛屿, 雨猫猫">
    <title>雨猫岛</title>
    <link rel="stylesheet" type="text/css" href="./Mainpage/index.css">
    <style>
        .hero {
            background-image: url('./Mainpage/hero-animation.gif');
            background-size: cover;
            background-position: center;
            animation: hero-animation 10s linear infinite;
            transition: background-position 1s ease-in-out;
        }
        @keyframes hero-animation {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 0%;
            }
        }
        .hero .prev-btn, .hero .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .hero .prev-btn {
            left: 20px;
        }
        .hero .next-btn {
            right: 20px;
        }
    </style>
</head>
<body>
    <!-- 标签栏 -->
    <div class="navbar">
        <!-- 搜索框 -->
        <div class="search-container">
            <div class="search-icon"></div>
            <input type="text" id="searchInput" class="search-bar" placeholder="别搜,没用...">
        </div>
        <div class="logo">
            雨猫岛
        </div>
        <ul>
            <li><a href="#intro">简介</a></li>
            <li><a href="#contact">联系猫猫</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#feedback">提出意见</a></li>
        </ul>
    </div>

    <!-- 动图背景与标题 -->
    <div class="hero">
        <button class="prev-btn">上一个</button>
        <button class="next-btn">下一个</button>
        <h1>雨猫岛</h1>
        <p>一只猫猫的个人网站</p>
    </div>

    <!-- 音乐播放器 -->
    <div class="player-btn">
        <div class="player-icon" id="playerIcon"></div>
        <div class="player-controls">
            <button id="playPause" style="background:transparent; border-width:0px; outline:none;">▶️</button>
        </div>
    </div>

    <!-- 播放列表 -->
    <div class="play-list" id="playList">
        <div class="song" data-src="./Mainpage/Music/All_Falls_down.mp3">All Falls Down</div>
        <div class="song" data-src="./Mainpage/Music/we_dont_talk_to_anymore.mp3">We don't talk to anymore</div>
        <div class="song" data-src="./Mainpage/Music/cotton_eye_joe.mp3">出生的小曲</div>
        <div class="song" data-src="./Mainpage/Music/bones.mp3">bones</div>
        <div class="song" data-src="./Mainpage/Music/deathstranding.mp3">Death Stranding</div>
        <div class="song" data-src="song6.mp3">Song 6</div>
        <div class="pagination">
            <button id="prevPage" disabled>←</button>
            <button id="nextPage">→</button>
        </div>
    </div>
    <script>
        // 获取相关元素
const hero = document.querySelector('.hero');
const prevBtn = document.querySelector('.hero .prev-btn');
const nextBtn = document.querySelector('.hero .next-btn');
let currentBackground = 0;
let totalBackgrounds = 3; // 假设有3个背景图片

// 初始化背景图片
function initBackground() {
    hero.style.backgroundImage = `url('./Mainpage/hero-animation-${currentBackground}.gif')`;
}

// 切换背景图片
function switchBackground(direction) {
    if (direction === 'next') {
        currentBackground = (currentBackground + 1) % totalBackgrounds;
    } else if (direction === 'prev') {
        currentBackground = (currentBackground - 1 + totalBackgrounds) % totalBackgrounds;
    }
    initBackground();
}

// 每60秒切换背景图片
setInterval(() => {
    switchBackground('next');
}, 60000);

// 添加点击事件监听器
prevBtn.addEventListener('click', () => {
    switchBackground('prev');
});

nextBtn.addEventListener('click', () => {
    switchBackground('next');
});

// 初始化背景图片
initBackground();
    </script>
</body>
</html>
