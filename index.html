<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="msvalidate.01" content="B71C8408EDA264902581D401CB093BD9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="雨猫的个人网站,欢迎来看一看呀">
    <meta name="keywords" content="雨猫岛, RaincatIsland, 雨猫的个人网站, 雨猫的岛屿, 雨猫猫">
    <title>雨猫岛</title>
    <link rel="stylesheet" type="text/css" href="./Mainpage/index.css">
</head>
<body>
    <!-- 标签栏 -->
    <div class="navbar">
        <!-- 搜索框 -->
        <div class="search-container">
            <div class="search-icon"></div>
            <input type="text" id="searchInput" class="search-bar" placeholder="别搜,没用...">
        </div>
        <div class="logo">
            雨猫岛
        </div>
        <ul>
            <li><a href="#intro">简介</a></li>
            <li><a href="#contact">联系猫猫</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#feedback">提出意见</a></li>
        </ul>
    </div>

    <!-- 动图背景与标题 -->
    <div class="hero">
        <h1>雨猫岛</h1>
        <p>一只猫猫的个人网站</p>
    </div>

    <!-- 预留扩展区域 -->
    <div class="content" id="intro">
        <h2>简介</h2>
        <p>我在这里分享我的项目和想法。</p>
    </div>

    <div class="content" id="contact">
        <h2>联系猫猫</h2>
        <p>如果你想联系我，可以通过以下方式：</p>
        <p>Email: raincat@example.com</p>
        <p>电话: +123456789</p>
    </div>

    <div class="content" id="projects">
        <h2>项目</h2>
        <p>目前正在进行中... <br>更多项目请关注！</p>
    </div>

    <div class="content" id="feedback">
        <h2>提出意见</h2>
        <p>有任何意见和建议请联系我！</p>
    </div>

    <!-- 音乐播放器 -->
    <div class="player-btn">
        <div class="player-icon" id="playerIcon"></div>
        <div class="player-controls">
            <button id="playPause" style="background:transparent; border-width:0px; outline:none;">▶️</button>
        </div>
    </div>

    <!-- 播放列表 -->
    <div class="play-list" id="playList">
        <div class="song" data-src="./Mainpage/Music/All_Falls_down.mp3">All Falls Down</div>
        <div class="song" data-src="./Mainpage/Music/we_dont_talk_to_anymore.mp3">We don't talk to anymore</div>
        <div class="song" data-src="./Mainpage/Music/cotton_eye_joe.mp3">出生的小曲</div>
        <div class="song" data-src="./Mainpage/Music/bones.mp3">bones</div>
        <div class="song" data-src="./Mainpage/Music/deathstranding.mp3">Death Stranding</div>
        <div class="song" data-src="song6.mp3">Song 6</div>
        <div class="pagination">
            <button id="prevPage" disabled>←</button>
            <button id="nextPage">→</button>
        </div>
    </div>
    <script>
        // 获取相关元素
const playerBtn = document.querySelector('.player-btn');
const playList = document.querySelector('.play-list');
const playPauseBtn = document.getElementById('playPause');
const audioPlayer = new Audio(); // 创建一个新的音频播放器
let isExpanded = false;

// 添加点击事件监听器
playerBtn.addEventListener('click', () => {
    if (isExpanded) {
        // 收起播放器
        playerBtn.classList.remove('expanded');
        playList.classList.remove('active');
        // 隐藏播放控件
        document.querySelector('.player-controls').style.display = 'none';
        isExpanded = false;
    } else {
        // 展开播放器
        playerBtn.classList.add('expanded');
        playList.classList.add('active');
        // 显示播放控件
        document.querySelector('.player-controls').style.display = 'flex';
        isExpanded = true;
    }
});

// 确保按钮点击时音乐继续播放
playPauseBtn.addEventListener('click', () => {
    if (audioPlayer.src) {
        if (audioPlayer.paused) {
            audioPlayer.play(); // 播放音乐
            playPauseBtn.textContent = '❚❚'; // 更改为暂停图标
        } else {
            audioPlayer.pause(); // 暂停音乐
            playPauseBtn.textContent = '▶️'; // 更改为播放图标
        }
    }
});

// 点击歌曲播放音乐并收回播放器
document.querySelectorAll('.play-list .song').forEach(song => {
    song.addEventListener('click', () => {
        const songSrc = song.getAttribute('data-src');
        audioPlayer.src = songSrc; // 设置音乐源
        audioPlayer.play(); // 播放音乐
        playPauseBtn.textContent = '❚❚'; // 更改为暂停图标

        // 收起播放器
        playerBtn.classList.remove('expanded');
        playList.classList.remove('active');
        document.querySelector('.player-controls').style.display = 'none';
        isExpanded = false;
    });
});
    </script>
</body>
</html>
