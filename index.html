<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵动风格静态网站</title>
    <link rel="stylesheet" href="./mainpage/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'Arial', sans-serif;
            color: #333;
        }
        .navbar {
            background-color: #69afd2;
            color: #fff;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 5000;
            border-radius: 5px;
            transition: transform 0.8s ease, background-color 0.8s ease;
        }
        .navbar.scrolled {
            transform: translateY(-50px);
            background-color: #4a90e2;
        }
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .nav-links {
            list-style: none;
            display: flex;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #ffeb3b;
        }
        .hero {
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>

<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵动风格静态网站</title>
    <link rel="stylesheet" href="./mainpage/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 固定导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">网站Logo</a>
            <ul class="nav-links">
                <li><a href="#about">关于我们</a></li>
                <li><a href="#gallery">画廊</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 背景图像和引人注目的标题 -->
    <header class="hero">
        <div class="hero-content">
            <h1>欢迎来到我们的灵动网站</h1>
            <p>体验美丽与功能的完美结合</p>
        </div>
    </header>

    <!-- 信息卡片 -->
    <section id="about" class="info-cards">
        <div class="container">
            <div class="card">
                <i class="fas fa-bolt"></i>
                <h3>快速</h3>
                <p>我们的服务快速且高效。</p>
            </div>
            <div class="card">
                <i class="fas fa-heart"></i>
                <h3>可靠</h3>
                <p>我们提供可靠的解决方案。</p>
            </div>
            <div class="card">
                <i class="fas fa-star"></i>
                <h3>优质</h3>
                <p>我们致力于提供优质的服务。</p>
            </div>
        </div>
    </section>

    <!-- 图像画廊 -->
    <section id="gallery" class="gallery">
        <div class="container">
            <h2>我们的作品</h2>
            <div class="gallery-grid">
                <img src="image1.jpg" alt="作品1">
                <img src="image2.jpg" alt="作品2">
                <img src="image3.jpg" alt="作品3">
            </div>
        </div>
    </section>

    <!-- 联系表单 -->
    <section id="contact" class="contact-form">
        <div class="container">
            <h2>联系我们</h2>
            <form>
                <input type="text" placeholder="姓名" required>
                <input type="email" placeholder="邮箱" required>
                <textarea placeholder="留言" required></textarea>
                <button type="submit">发送</button>
            </form>
        </div>
    </section>

    <!-- FAQ部分 -->
    <section class="faq">
        <div class="container">
            <h2>常见问题</h2>
            <div class="faq-item">
                <h3>问题1</h3>
                <p>这是问题1的答案。</p>
            </div>
            <div class="faq-item">
                <h3>问题2</h3>
                <p>这是问题2的答案。</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>© 2023 灵动网站. 保留所有权利.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
