<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="msvalidate.01" content="B71C8408EDA264902581D401CB093BD9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="雨猫的个人网站,欢迎来看一看呀">
    <meta name="keywords" content="雨猫岛, RaincatIsland, 雨猫的个人网站, 雨猫的岛屿, 雨猫猫">
    <title>雨猫岛</title>

</head>
<body>
    <!-- 标签栏 -->
    <div class="navbar">
        <!-- 搜索框 -->
        <div class="search-container">
            <div class="search-icon"></div>
            <input type="text" id="searchInput" class="search-bar" placeholder="别搜,没用...">
        </div>
        <div class="logo">
            雨猫岛
        </div>
        <ul>
            <li><a href="#intro">简介</a></li>
            <li><a href="#contact">联系猫猫</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#feedback">提出意见</a></li>
        </ul>
    </div>

    <!-- 动图背景与标题 -->
    <div class="hero">
        <h1>雨猫岛</h1>
        <p>一只猫猫的个人网站</p>
    </div>

    <!-- 预留扩展区域 -->
    <div class="content" id="intro">
        <h2>简介</h2>
        <p>我在这里分享我的项目和想法。</p>
    </div>

    <div class="content" id="contact">
        <h2>联系猫猫</h2>
        <p>如果你想联系我，可以通过以下方式：</p>
        <p>Email: raincat@example.com</p>
        <p>电话: +123456789</p>
    </div>

    <div class="content" id="projects">
        <h2>项目</h2>
        <p>目前正在进行中... <br>更多项目请关注！</p>
    </div>

    <div class="content" id="feedback">
        <h2>提出意见</h2>
        <p>有任何意见和建议请联系我！</p>
    </div>

    <!-- 音乐播放器 -->
    <div class="player-btn">
        <div class="player-icon" id="playerIcon"></div>
        <div class="player-controls">
            <button id="playPause">▶️</button>
        </div>
    </div>

    <!-- 播放列表 -->
    <div class="play-list" id="playList">
        <div class="song" data-src="song1.mp3">Song 1</div>
        <div class="song" data-src="song2.mp3">Song 2</div>
        <div class="song" data-src="song3.mp3">Song 3</div>
        <div class="song" data-src="song4.mp3">Song 4</div>
        <div class="song" data-src="song5.mp3">Song 5</div>
        <div class="song" data-src="song6.mp3">Song 6</div>
        <div class="pagination">
            <button id="prevPage" disabled>←</button>
            <button id="nextPage">→</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playerBtn = document.querySelector('.player-btn');
            const playerIcon = document.getElementById('playerIcon');
            const playList = document.getElementById('playList');
            const playPause = document.getElementById('playPause');
            const prevPage = document.getElementById('prevPage');
            const nextPage = document.getElementById('nextPage');
            let isExpanded = false;
            let isPlaying = false;
            let currentPage = 0;
            const itemsPerPage = 5;
            let audio = new Audio(); // 创建音频对象

            // 播放按钮点击事件
            playerBtn.addEventListener('click', () => {
                isExpanded = !isExpanded;
                playerBtn.classList.toggle('expanded', isExpanded);
                playList.classList.toggle('active', isExpanded);
                if (isExpanded) {
                    // 扩展时显示播放控制按钮
                    playPause.textContent = isPlaying ? '⏸️' : '▶️';
                } else {
                    // 收起时隐藏播放控制按钮
                    playPause.textContent = '';
                    audio.pause(); // 收起时暂停音乐
                }
            });

            // 播放/暂停按钮点击事件
            playPause.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    playPause.textContent = '▶️';
                } else {
                    audio.play();
                    playPause.textContent = '⏸️';
                }
                isPlaying = !isPlaying;
            });

            // 播放列表项点击事件
            playList.addEventListener('click', (event) => {
                if (event.target.classList.contains('song')) {
                    const src = event.target.getAttribute('data-src');
                    audio.src = src;
                    audio.play();
                    playPause.textContent = '⏸️';
                    isPlaying = true;
                }
            });

            // 翻页按钮点击事件
            prevPage.addEventListener('click', () => {
                if (currentPage > 0) {
                    currentPage--;
                    updatePlayList();
                }
            });

            nextPage.addEventListener('click', () => {
                const totalItems = document.querySelectorAll('.play-list .song').length;
                if ((currentPage + 1) * itemsPerPage < totalItems) {
                    currentPage++;
                    updatePlayList();
                }
            });

            // 更新播放列表显示
            function updatePlayList() {
                const songs = document.querySelectorAll('.play-list .song');
                songs.forEach((song, index) => {
                    song.style.display = (index >= currentPage * itemsPerPage && index < (currentPage + 1) * itemsPerPage) ? 'block' : 'none';
                });
                prevPage.disabled = currentPage === 0;
                nextPage.disabled = (currentPage + 1) * itemsPerPage >= songs.length;
            }

            // 初始化播放列表显示
            updatePlayList();
        });
    </script>
</body>
</html>
