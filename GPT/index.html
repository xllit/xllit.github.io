<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="images/x-icon" href="./static/images/favicon.ico">
  <link rel="stylesheet" href="./static/css/bootstrap.min.css">
  <link rel="stylesheet" href="./static/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="./static/css/github-dark-dimmed.min.css">
  <link rel="stylesheet" href="./static/css/style.css">
  <title>ChatGPT</title>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="box col-xs-12">
        <div class="answer">
          <div id="chatWindow"></div>
          <div class="function">
            <div class="others">
              <div class="left">
                <div class="settings common dropup">
                  <a class="dropdown-toggle icon-style" id="dropdownMenu" data-toggle="dropdown" aria-haspopup="true"
                     aria-expanded="false" title="设置">
                    <i class="fa fa-cogs fa-lg" aria-hidden="true"></i>
                  </a>
                  <div class="dropdown-menu" style="padding:0;" onclick="event.stopPropagation()">
                    <div class="settings-common">
                      <span><i class="fa fa fa-linode fa-lg" aria-hidden="true"></i>&nbsp;主题</span>
                      <select class="form-control ipt-common theme">
                        <option value="light">亮色</option>
                        <option value="dark">暗色</option>
                      </select>
                    </div>
                    <div class="settings-common">
                      <span><i class="fa fa-key fa-lg" aria-hidden="true"></i>&nbsp; OpenAIKey</span>
                      <input type="text" class="form-control ipt-common api-key" placeholder="可用自己的api key">
                    </div>
                    <div class="settings-common">
                      <span><i class="fa fa-reddit-alien fa-lg" aria-hidden="true"></i>&nbsp;接口地址</span>
                      <input type="text" class="form-control ipt-common baseurl" placeholder="https://api.openai.com">
                    </div>
                    <div class="settings-common">
                      <span><i class="fa fa-floppy-o fa-lg" aria-hidden="true"></i>&nbsp;记录对话内容，刷新不会消失</span>
                      <div class="chck-btn">
                        <input id="chck-1" type="checkbox">
                        <label for="chck-1" class="check-trail">
                          <div class="check-handler"></div>
                        </label>
                      </div>
                    </div>
                    <div class="settings-common">
                      <span><i class="fa fa-retweet fa-lg" aria-hidden="true"></i>&nbsp;
                        开启连续对话，加倍消耗tokens</span>
                      <div class="chck-btn">
                        <input id="chck-2" type="checkbox">
                        <label for="chck-2" class="check-trail">
                          <div class="check-handler"></div>
                        </label>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="center">
                正在和 <span id="role-name">聊天机器人</span> 对话
              </div>
              <div class="right">
                <div class="screenshot common">
                  <a class="icon-style" title="截图保存对话"><i class="fa fa-file-image-o fa-lg" aria-hidden="true"></i></a>
                </div>
                <div class="delete common">
                  <a class="icon-style" title="删除历史记录"><i class="fa fa-trash-o fa-lg" aria-hidden="true"></i></a>
                </div>
              </div>
            </div>
            <div class="ipt">
              <div class="col-xs-12">
                <textarea id="chatInput" class="form-control"></textarea>
              </div>
              <button id="chatBtn" class="btn btn-primary" type="button">发送信息</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- 预设选择弹出层 -->
  <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel"
       onclick="event.stopPropagation()">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
          <h4 class="modal-title" id="myModalLabel">选择预设</h4>
        </div>
        <div class="user-modall" onclick="event.stopPropagation()">
          <textarea id="customPrompt" placeholder="在此处输入提示词"></textarea>
          <button class="btn btn-primary">使用自定义预设</button>
        </div>
        <div class="modal-body-list" onclick="event.stopPropagation()"></div>
      </div>
    </div>
  </div>
</body>
<script src="./static/js/jquery-2.1.1.js"></script>
<script src="./static/js/bootstrap.min.js"></script>
<script src="./static/js/highlight.min.js"></script>
<script src="./static/js/marked.min.js"></script>
<script src="./static/js/html2canvas.min.js"></script>
<script src="./static/js/config.js"></script>
<script src="./static/js/custom.js"></script>

</html>
