<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
  <title>八三班整人神器</title>
  <style>
    .name-display {
      font-size: 80px;
      text-align: center;
      margin-top: 50px;
      display: none;
      color: rgb(0, 31, 110);
      font-family: "Simsun", "宋体", serif;
      user-select: none;
    }

    #full-screen-btn {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(181, 216, 255);
      border: none;
      cursor: pointer;
      z-index: -1;
      user-select: none;
    }
    .footer-text {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  color: #666;
  z-index: 9999;
  user-select: none;
}
.footer-text2 {
  position: fixed;

  font-size: 12px;
  color: #666;

  user-select: none;
}
  </style>
</head>
<body>
    <h1 style="text-align:center;color:rgb(4, 96, 90);">八三班<s><u>整人</u></s>神器</h1>
    <h2 style="text-align:center;color:rgb(0, 136, 255);">点击任何地方显示随机人名</h2>
  <button id="full-screen-btn" onclick="displayRandomName()"></button>
  <div class="name-display" id="name-display"></div>

  <audio id="name-audio" src="1.mp3"></audio>

      "姚晨", "田堂堂", "孙蘅", "刘妍", "张驰北", "彭恩宇", "黄鹏博", "孙雨松",
      "李振昊", "曹嘉辉", "张懿", "田锦轩", "王浩然", "刘妍雅", "张世威", "吴怡燃",
      "刘子祺", "戚梦园", "韩哲于", "韩哲于", "韩哲于", "韩哲于","梁一鸣", "胡兆亮", "黄雪阳", "王梓硕", "崔琪悦",
      "王艺源", "高艺瑄", "张智霖", "桂雅倩", "夏楚颖", "郭屹然", "刘慧博", "王恩慧",

    function displayRandomName() {
      var randomIndex = Math.floor(Math.random() * names.length);
      var randomName = names[randomIndex];
      var nameDisplay = document.getElementById("name-display");
      nameDisplay.textContent = randomName;
      nameDisplay.style.display = "block";

      var nameAudio = document.getElementById("name-audio");
      nameAudio.play();
    }
  </script>
